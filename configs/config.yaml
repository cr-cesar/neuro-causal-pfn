# Default composition. The mode=prototype or mode=full switch
# reconfigures the entire run. These files mirror the prototype_config
# and full_config functions of the training modules.
defaults:
  - mode: prototype
  - data: lesion
  - vae: lesion_vae
  - prior: intersynth
  - pfn: model
  - _self_

seed: 0
out_dir: outputs/${mode.name}
